name: "95598 for Home Assistant (laxy fork)"
version: "0.1.29"
slug: "ha_95598"
description: "Sync 95598 electricity data to Home Assistant (PID 1 fix + LLM vision captcha solver)"
url: "https://github.com/laxy-me/ha-95598"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
# Ingress: serve the latest QR code through HA's auth proxy. Users
# can hit "Open Web UI" on this addon page to see / refresh the QR
# without exposing /share or /local/.
ingress: true
ingress_port: 8099
panel_icon: mdi:flash
panel_title: "95598 用电"
homeassistant_api: true
# Upstream had `init: false` which left bash as PID 1. xvfb-run's
# wait-for-X-ready uses USR1 signaling, but bash PID 1 treats unhandled
# USR1 as SIG_IGN, so the parent never wakes from `wait` and the
# python child is never spawned. Removing the line lets supervisor
# wrap the entrypoint with tini (its default).
host_network: true
build: true
map:
  - type: addon_config
    read_only: false
    path: /app/data
  - type: share
    read_only: false
options:
  account: ""
  password: ""
  login_credentials: []
  ignore_user_id: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  job_start_time: "07:00"
  job_times: 2
  retry_times_limit: 3
  retry_wait_time_offset_unit: 5
  republish_interval_minutes: 60
  daily_usage_window_days: 7
  publish_tou_detail_sensors: false
  tou_price_config: "config/tou_price_config.json"
  notifier: "none"
  tg_bot_token: ""
  tg_chat_id: ""
  tg_api_base_url: "https://api.telegram.org"
  stale_data_alert_days: 2
  captcha_point_click_max_refreshes: 4
  login_fallback: "qrcode"
  qr_code_login_refresh_limit: 1
  trace_retention_days: 7
  # LLM vision captcha solver — when api key is set, the addon tries
  # the LLM first, falls back to the local image solver if it fails.
  llm_api_key: ""
  llm_provider: "zhipu"
  llm_model: ""
  llm_base_url: ""
  # TOU rate override. When tou_peak_rate is set, the addon synthesizes a
  # single-tier all-year config from these four numbers (defaults match
  # peak for households on simple peak/valley plans). This replaces the
  # tou_price_config.json file lookup. Leave blank to use the file.
  tou_peak_rate: 0
  tou_valley_rate: 0
  tou_flat_rate: 0
  tou_tip_rate: 0
  # Optional ladder (阶梯电价). Set tou_tier_2_limit_kwh to a non-zero
  # threshold (e.g. 2760 for 江苏 居民) to enable. Surcharge fields are
  # the per-kWh increment applied uniformly across peak / valley / flat
  # / tip. Leave limits at 0 for a single-tier plan.
  tou_tier_scope: "year"
  tou_tier_2_limit_kwh: 0
  tou_tier_3_limit_kwh: 0
  tou_tier_2_surcharge: 0
  tou_tier_3_surcharge: 0
schema:
  account: str
  password: password
  login_credentials:
    - account: str
      password: password
      label: str?
  ignore_user_id: str?
  mqtt_host: str?
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  job_start_time: str
  job_times: int(1,10)
  retry_times_limit: int(0,10)
  retry_wait_time_offset_unit: int(2,30)
  republish_interval_minutes: int(0,1440)
  daily_usage_window_days: list(7|30)
  publish_tou_detail_sensors: bool
  tou_price_config: str
  notifier: list(none|telegram)
  tg_bot_token: str?
  tg_chat_id: str?
  tg_api_base_url: url?
  stale_data_alert_days: int(1,30)
  captcha_point_click_max_refreshes: int(0,10)
  login_fallback: list(qrcode|none)
  qr_code_login_refresh_limit: int(0,5)
  trace_retention_days: int(1,30)
  llm_api_key: password?
  llm_provider: list(zhipu|openai|custom)?
  llm_model: str?
  llm_base_url: str?
  tou_peak_rate: float(0,10)?
  tou_valley_rate: float(0,10)?
  tou_flat_rate: float(0,10)?
  tou_tip_rate: float(0,10)?
  tou_tier_scope: list(year|month)?
  tou_tier_2_limit_kwh: float(0,100000)?
  tou_tier_3_limit_kwh: float(0,100000)?
  tou_tier_2_surcharge: float(0,10)?
  tou_tier_3_surcharge: float(0,10)?
