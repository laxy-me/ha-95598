services:
  ha-95598:
    env_file:
      - .env
    image: ${IMAGE:-ghcr.io/renxiaoyaoo/ha-95598:latest}
    container_name: ha-95598
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SET_CONTAINER_TIMEZONE=true
      - CONTAINER_TIMEZONE=Asia/Shanghai
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    init: true
