services:
  ha-95598:
    env_file:
      - .env
    build:
      context: .
    image: ha-95598
    container_name: ha-95598-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SET_CONTAINER_TIMEZONE=true
      - CONTAINER_TIMEZONE=Asia/Shanghai
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    init: true
